# Deploy no servidor — baixa imagens do Docker Hub (sem build)
#
# 1. Copie este arquivo + .env para o servidor
# 2. docker login
# 3. docker compose -f docker-compose.prod.yml pull
# 4. docker compose -f docker-compose.prod.yml up -d
#
# Atualizar versão (obrigatório: frontend + api):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --force-recreate

services:
  vox-script-salux:
    image: ${DOCKERHUB_USER}/vox-script-salux:${IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    image: ${DOCKERHUB_USER}/vox-script-salux-api:${IMAGE_TAG:-latest}
    environment:
      ORACLE_USER: ${ORACLE_USER:-validator}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-ValidatorPass1}
      ORACLE_CONNECT_STRING: ${ORACLE_CONNECT_STRING:-oracle:1521/XEPDB1}
      AUTH_SECRET: ${AUTH_SECRET:-}
      MASTER_USERNAME: ${MASTER_USERNAME:-master}
      MASTER_PASSWORD: ${MASTER_PASSWORD:-master@123}
    depends_on:
      oracle:
        condition: service_healthy
    restart: unless-stopped

  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    environment:
      ORACLE_PASSWORD: ${ORACLE_ADMIN_PASSWORD:-ValidatorAdmin1}
      APP_USER: ${ORACLE_USER:-validator}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-ValidatorPass1}
    volumes:
      - oracle-validator-data:/opt/oracle/oradata
    expose:
      - "1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  oracle-validator-data:
